# Config
# ========================================================================================

url:                   https://minkyujeon.github.io

# General settings
# ---------------------------------------------------------------------------------------

lang:                  en

# The title of your blog. Used in the sidebar and the browser tab.
title:                 Minkyu Jeon

# A short description (~150 chars) of the page used for the meta description tag.
description:           >
  PhD Candidate in Computer Science at Princeton University. Research focuses on 3D reconstruction,
  generative models, and their applications to scientific imaging (cryo-EM, protein design).

# A shorter description for the sidebar.
tagline:               PhD Candidate @ Princeton CS

# A list of keywords for your blog
keywords:              [machine learning, computer vision, cryo-EM, protein design, generative models, diffusion models]

# A (square) logo for your site.
logo:                  /assets/img/profile.jpg

# This should be the same as first entry in `_data/authors.yml`.
author:
  name:                Minkyu Jeon
  email:               mj7341@princeton.edu

# Add links to the sidebar.
menu:
  - title:             Publications
    url:               /publications/
  - title:             CV
    url:               /cv/

# Add links to the footer.
legal: []

# This text will appear in a `<small>` tag in the footer of every page.
copyright:             © 2025 Minkyu Jeon. All rights reserved.

# Format of the permalinks
permalink:             /:categories/:year-:month-:day-:title/

# Pagination configuration (used by the `blog` layout)
paginate:              10
paginate_path:         /:num/


# Theme
# ---------------------------------------------------------------------------------------

theme: jekyll-theme-hydejack

# Customization
# ----------------------------------------------------------------------------------------

# Sidebar image and theme color of the site.
accent_image:
  background:          rgb(25,55,71)
  overlay:             false
accent_color:          rgb(79,177,186)

# This is used for the `theme-color` meta tag,
# which changes the background color of the browser UI in certain browsers.
theme_color:           rgb(25,55,71)

defaults:
  # Don't include documents in assets in the sitemap
  - scope:
      path:            assets/
    values:
      sitemap:         false

  # Don't include licenses in sitemap (feel free to delete)
  - scope:
      path:            licenses/
    values:
      layout:          plain
      sitemap:         false

  - scope:
      type:            projects
    values:
      seo:
        type:          WebPage
  - scope:
      type:            featured_categories
    values:
      seo:
        type:          WebPage
  - scope:
      type:            featured_tags
    values:
      seo:
        type:          WebPage

kramdown:
  math_engine:         katex
  math_engine_opts:    {}
  footnote_backlink:   '&#x21a9;&#xfe0e;'


# Hydejack Settings
# ----------------------------------------------------------------------------------------

hydejack:
  post_addons:         [about, related, comments]
  project_addons:      [about, other, comments]
  no_mark_external:    false
  no_push_state:       false
  no_drawer:           false
  no_navbar:           false
  no_search:           false
  no_inline_css:       false
  no_page_style:       false
  no_break_layout:     true
  no_toc:              false
  no_third_column:     false
  no_large_headings:   false
  no_structured_data:  false
  no_theme_color:      false
  no_breadcrumbs:      false
  use_lsi:             true
  cookies_banner:      false
  advertise:           false
  hide_dates:          false
  hide_last_modified:  false
  dark_mode:
    always:            false
    dynamic:           true
    icon:              true
  offline:
    enabled:           false
    cache_version:     13
    precache_assets:
      - /assets/img/swipe.svg


# Collections
# ----------------------------------------------------------------------------------------

collections:
  featured_categories:
    permalink:         /:name/
    output:            true

  featured_tags:
    permalink:         /tag-:name/
    output:            true


# File inclusion/exclusion
# ----------------------------------------------------------------------------------------

exclude:
  - .jekyll-cache
  - .sass-cache
  - .ruby-lsp
  - '*.toml'
  - vendor
  - Gemfile
  - Gemfile.lock
include:
  - .well-known
  - LICENSE.md


# Plugins
# ----------------------------------------------------------------------------------------

plugins:
  - jekyll-default-layout
  - jekyll-feed
  - jekyll-optional-front-matter
  - jekyll-paginate
  - jekyll-readme-index
  - jekyll-redirect-from
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-titles-from-headings
  - jekyll-include-cache
  - jekyll-last-modified-at


# SEO Tag
# ---------------------------------------------------------------------------------------

twitter:
  username:              MinkyuJeon19791
  card:                  summary_large_image

social:
  name:                  Minkyu Jeon
  links:
    - https://x.com/MinkyuJeon19791
    - https://www.linkedin.com/in/minkyu-jeon-9a5b92152/
    - https://scholar.google.com/citations?hl=en&user=kyQR6ecAAAAJ

defaults_og:
  image:                 /assets/img/profile.jpg


# Plugin Configs
# ---------------------------------------------------------------------------------------
optional_front_matter:
  remove_originals:    true

readme_index:
  remove_originals:    true
  with_frontmatter:    true

relative_links:
  collections:         true

titles_from_headings:
  strip_title:         true
  collections:         true

compress_html:
  comments:            ["<!--", "-->"]
  clippings:           all
  endings:             all
  ignore:
    envs:              [development]

sass:
  style:               compressed

jekyll_compose:
  default_front_matter:
    posts:
      layout: post
      description: >
        A short ~160 character description of your post for search engines,
        social media previews, etc.
      image:
        path: /assets/img/profile.jpg
